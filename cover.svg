<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="560" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="350" cy="80" r="120" fill="none" stroke="#e94560" stroke-width="0.5" opacity="0.2"/>
  <circle cx="50" cy="500" r="80" fill="none" stroke="#e94560" stroke-width="0.5" opacity="0.2"/>
  <circle cx="200" cy="280" r="180" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.1"/>

  <!-- Core capability rings representing the product architecture -->
  <!-- L1: Context / 模型输入层 -->
  <circle cx="200" cy="280" r="160" fill="none" stroke="#4a90d9" stroke-width="2" stroke-dasharray="8 4" opacity="0.6"/>
  <!-- L2: Tool / 行动层 -->
  <circle cx="200" cy="280" r="135" fill="none" stroke="#50c878" stroke-width="2" stroke-dasharray="8 4" opacity="0.6"/>
  <!-- L3: Loop / 编排层 -->
  <circle cx="200" cy="280" r="110" fill="none" stroke="#f5a623" stroke-width="2" stroke-dasharray="8 4" opacity="0.6"/>
  <!-- L4: Extension / 安全与扩展层 -->
  <circle cx="200" cy="280" r="85" fill="none" stroke="#e94560" stroke-width="2" stroke-dasharray="8 4" opacity="0.6"/>
  <!-- L5: Memory / 持久化层 -->
  <circle cx="200" cy="280" r="60" fill="none" stroke="#9b59b6" stroke-width="2" stroke-dasharray="8 4" opacity="0.6"/>
  <!-- L6: Eval / 评测层 -->
  <circle cx="200" cy="280" r="35" fill="none" stroke="#1abc9c" stroke-width="2" stroke-dasharray="8 4" opacity="0.6"/>
  <!-- L7: UX / 交互层 -->
  <circle cx="200" cy="280" r="12" fill="#e94560" opacity="0.8"/>

  <!-- Layer labels -->
  <text x="200" y="115" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4a90d9" opacity="0.8">L1 Context</text>
  <text x="200" y="140" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#50c878" opacity="0.8">L2 Tool</text>
  <text x="200" y="165" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#f5a623" opacity="0.8">L3 Loop</text>
  <text x="200" y="190" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e94560" opacity="0.8">L4 Extension</text>
  <text x="200" y="215" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#9b59b6" opacity="0.8">L5 Memory</text>
  <text x="200" y="240" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1abc9c" opacity="0.8">L6 Eval</text>

  <!-- Title -->
  <text x="200" y="340" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#ffffff" filter="url(#glow)">Pi Agent</text>
  <text x="200" y="370" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#e94560">实战：从使用到复刻</text>

  <!-- Subtitle -->
  <text x="200" y="410" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888888">面向前端工程师的 Agent Harness 指南</text>

  <!-- Bottom line -->
  <rect x="120" y="440" width="160" height="2" fill="url(#accent)" rx="1"/>

  <!-- Footer -->
  <text x="200" y="490" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666666">小内核 · 扩展生态 · 24章源码对照</text>
  <text x="200" y="510" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#444444">从用户视角到自定义 Harness</text>

  <!-- π symbol decoration -->
  <text x="355" y="545" text-anchor="middle" font-family="serif" font-size="36" fill="#e94560" opacity="0.3">π</text>
</svg>
