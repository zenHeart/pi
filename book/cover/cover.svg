<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560" role="img" aria-labelledby="title desc">
  <title id="title">Pi Agent 复刻指南</title>
  <desc id="desc">从源码边界到可运行 Coding Agent 的复刻指南封面，以圆形结构表达 agent 的循环、上下文与工具协作。</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbf7f0"/>
      <stop offset="1" stop-color="#ece3d7"/>
    </linearGradient>
  </defs>

  <rect width="400" height="560" fill="url(#paper)"/>

  <circle cx="382" cy="184" r="132" fill="#0f766e" opacity="0.13"/>

  <g font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="50" y="78" font-size="10" font-weight="800" letter-spacing="2.2" fill="#6a7280">ZENHEART / PI</text>

    <text x="50" y="188" font-size="62" font-weight="900" fill="#17191f">Pi</text>
    <text x="50" y="256" font-size="62" font-weight="900" fill="#17191f">Agent</text>

    <text x="52" y="328" font-size="34" font-weight="900" fill="#d65b43">复刻指南</text>

    <text x="52" y="388" font-size="16" font-weight="800" fill="#0f766e">从源码边界到可运行 Agent</text>
    <text x="52" y="418" font-size="12" fill="#606873">理解核心概念、使用方式与设计边界</text>

    <text x="52" y="502" font-size="12" font-weight="800" fill="#17191f">16 章 · 复刻路线版</text>
    <text x="52" y="524" font-size="10" font-weight="700" fill="#6a7280">基于 zenHeart/pi fork</text>
  </g>
</svg>
