<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pi Agent 复刻指南</title>
  <meta name="description" content="一本面向完全不了解 Pi 的工程师的源码复刻教材，围绕 Pi 的核心概念、使用方式、运行原理和设计边界组织。">
  <meta name="theme-color" content="#f7f3ec">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f3ec;
      --text: #17191f;
      --muted: #626a75;
      --line: rgba(23, 25, 31, .14);
      --panel: rgba(255, 255, 255, .62);
      --accent: #9a4f36;
      --accent-dark: #743725;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #101418;
        --text: #f2eee7;
        --muted: #a9b0ba;
        --line: rgba(242, 238, 231, .16);
        --panel: rgba(255, 255, 255, .06);
        --accent: #d77856;
        --accent-dark: #f09272;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.6;
    }

    .page {
      display: grid;
      width: min(1080px, calc(100% - 36px));
      min-height: 100vh;
      margin: 0 auto;
      grid-template-rows: 1fr auto;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(260px, 360px);
      gap: clamp(32px, 7vw, 80px);
      align-items: center;
      padding: clamp(36px, 8vh, 72px) 0 28px;
    }

    .eyebrow {
      margin: 0 0 14px;
      color: var(--accent-dark);
      font-size: 13px;
      font-weight: 750;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 720px;
      margin: 0;
      color: var(--accent);
      font-size: clamp(44px, 7vw, 86px);
      line-height: 1;
      letter-spacing: 0;
    }

    .lead {
      max-width: 680px;
      margin: 24px 0 0;
      font-size: clamp(17px, 2vw, 22px);
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 28px 0 0;
      padding: 0;
      list-style: none;
    }

    .stats li {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 12px;
      background: var(--panel);
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
      margin-top: 36px;
    }

    .button {
      display: inline-flex;
      min-height: 50px;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      padding: 0 22px;
      background: var(--accent);
      color: #fff;
      font-weight: 800;
      text-decoration: none;
    }

    .link {
      color: var(--muted);
      font-weight: 750;
      text-underline-offset: 5px;
    }

    .cover {
      width: 100%;
      max-height: 68vh;
      border-radius: 8px;
      box-shadow: 0 26px 70px rgba(0, 0, 0, .22);
    }

    footer {
      border-top: 1px solid var(--line);
      padding: 16px 0 22px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 760px) {
      .hero {
        grid-template-columns: 1fr;
      }

      .cover {
        width: min(78vw, 320px);
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero" aria-labelledby="title">
      <div>
        <p class="eyebrow">ZenHeart · Pi Agent Handbook</p>
        <h1 id="title">Pi Agent 复刻指南</h1>
        <p class="lead">从源码边界到可运行 Coding Agent，帮助完全不了解 Pi 的读者理解核心概念、核心用法、核心原理与复刻设计。</p>
        <ul class="stats" aria-label="书籍规模">
          <li>25 章</li>
          <li>5 个部分</li>
          <li>源码对照</li>
          <li>自动构建 EPUB</li>
        </ul>
        <div class="actions">
          <a class="button" href="pi-agent-handbook.epub?v=2147aba" download="pi-agent-handbook.epub">下载 EPUB</a>
          <a class="link" href="https://github.com/zenHeart/pi/tree/book">查看 GitHub 源码</a>
        </div>
      </div>
      <img class="cover" src="cover.svg?v=2147aba" alt="Pi Agent 复刻指南 EPUB 封面">
    </section>
    <footer>由 GitHub Actions 在 book 分支推送时自动构建并发布到 gh-pages。</footer>
  </main>
</body>
</html>
